name: CI
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Design QA — token gate (Plan 10 §10)
        run: pnpm design-qa
      - name: Typecheck
        run: pnpm exec tsc --noEmit
      - name: Unit tests (fixtures, grounding, seeds)
        run: pnpm test
